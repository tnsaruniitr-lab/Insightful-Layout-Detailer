kind = "web"
previewPath = "/"
title = "Sieve"
version = "1.0.0"
id = "artifacts/sieve"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21608

[services.development]
run = "pnpm --filter @workspace/sieve run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sieve", "run", "build" ]
publicDir = "artifacts/sieve/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21608"
BASE_PATH = "/"
